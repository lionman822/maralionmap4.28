<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>马赛马拉狮群定位</title>
    <meta
      name="description"
      content="基于 Leaflet、OpenFreeMap 和 OpenStreetMap 的马赛马拉狮群点位定位网页应用。"
    />
    <meta name="theme-color" content="#173e37" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="狮群定位" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://tiles.openfreemap.org" />
    <link rel="preconnect" href="https://tile.openstreetmap.org" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">Masai Mara</p>
          <h1>马赛马拉狮群定位</h1>
        </div>
        <div class="topbar-actions">
          <span class="pill" id="pointCount">27 个点位</span>
          <button class="button primary" id="locateBtn" type="button">定位我</button>
          <button class="button" id="watchBtn" type="button">实时跟踪</button>
          <button class="button" id="fitBtn" type="button">显示全部</button>
        </div>
      </header>

      <main class="workspace">
        <section class="map-area" aria-label="地图">
          <div class="map-toolbar">
            <label class="select-label" for="layerSelect">底图</label>
            <select id="layerSelect" class="select">
              <option value="openfreemap">OpenFreeMap</option>
              <option value="osm" selected>OpenStreetMap</option>
            </select>
            <span class="map-status" id="mapStatus">地图加载中</span>
          </div>
          <div class="nearest-strip" id="nearestStrip" aria-live="polite"></div>
          <div id="map"></div>
        </section>

        <aside class="sidebar" aria-label="点位列表">
          <button class="drawer-handle" id="drawerToggle" type="button" aria-expanded="false" aria-controls="drawerContent">
            <span>
              <strong>点位列表</strong>
              <small id="drawerSummary">27 个点位</small>
            </span>
            <span class="drawer-cue" id="drawerCue">展开</span>
          </button>

          <div class="drawer-content" id="drawerContent">
            <div class="search-row">
              <input id="searchInput" class="search" type="search" placeholder="搜索狮群名称" />
              <button class="button compact" id="importBtn" type="button">导入 KML</button>
              <button class="button compact" id="resetBtn" type="button">默认点位</button>
              <input id="kmlInput" type="file" accept=".kml,application/vnd.google-earth.kml+xml,text/xml" hidden />
            </div>

            <div class="status-stack">
              <div class="status-line" id="locationStatus">等待定位</div>
              <div class="status-line subtle" id="nearestStatus">定位后显示最近点位</div>
              <div class="status-line privacy-note">位置只在本机计算，不上传服务器</div>
            </div>

            <div class="list-head">
              <span id="sourceName">内置 KML：马赛马拉的狮群</span>
              <span id="filterCount"></span>
            </div>
            <div class="point-list" id="pointList"></div>
          </div>
        </aside>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.22/leaflet-maplibre-gl.js"></script>
    <script src="app.js"></script>
  </body>
</html>
